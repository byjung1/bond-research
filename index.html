<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해외채권 투자 리포트 - Premium Research</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.15), 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .product-badge {
            display: inline-block;
            background: #1e3c72;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .product-description {
            font-size: 14px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .product-features {
            list-style: none;
            margin-bottom: 20px;
        }

        .product-features li {
            font-size: 13px;
            color: #4a5568;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .product-features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #1e3c72;
            font-weight: bold;
        }

        .product-footer {
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #1e3c72;
        }

        .product-price span {
            font-size: 16px;
            font-weight: 400;
            color: #718096;
        }

        .buy-button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .buy-button:hover {
            background: #2a5298;
        }

        .buy-button:active {
            transform: scale(0.98);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 22px;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .modal-header p {
            font-size: 14px;
            color: #718096;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1e3c72;
            color: white;
        }

        .btn-primary:hover {
            background: #2a5298;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .download-section {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .download-section.active {
            display: block;
        }

        .download-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .download-section h2 {
            font-size: 24px;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .download-section p {
            font-size: 16px;
            color: #718096;
            margin-bottom: 24px;
        }

        .download-button {
            background: #48bb78;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            transition: background 0.2s;
        }

        .download-button:hover {
            background: #38a169;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .modal-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 해외채권 투자 리포트</h1>
            <p>전문가의 심층 분석으로 똑똑한 투자 결정을 내리세요</p>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be dynamically inserted here -->
        </div>

        <div class="download-section" id="downloadSection">
            <div class="download-icon">✅</div>
            <h2>결제가 완료되었습니다!</h2>
            <p id="downloadMessage">구매하신 리포트를 다운로드하실 수 있습니다.</p>
            <a href="#" class="download-button" id="downloadButton">📥 리포트 다운로드</a>
        </div>
    </div>

    <!-- Purchase Modal -->
    <div class="modal" id="purchaseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalProductTitle">리포트 구매</h2>
                <p id="modalProductPrice">₩1,000</p>
            </div>
            <form id="purchaseForm">
                <div class="form-group">
                    <label for="buyerName">이름 *</label>
                    <input type="text" id="buyerName" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="buyerEmail">이메일 *</label>
                    <input type="email" id="buyerEmail" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="buyerPhone">전화번호 *</label>
                    <input type="tel" id="buyerPhone" required placeholder="010-1234-5678">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">취소</button>
                    <button type="submit" class="btn-primary">결제하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample products data
        const products = [
            {
                id: 'us-treasury-2026',
                title: '2026 미국 국채 투자 전략',
                badge: 'US Treasury',
                description: '연준 금리 정책 변화에 따른 미국 국채 투자 가이드',
                features: [
                    '2년/5년/10년물 수익률 전망',
                    '듀레이션 전략 상세 분석',
                    '최적 매수 타이밍 제시'
                ],
                price: 1000,
                pdfUrl: '/downloads/us-treasury-2026.pdf' // 실제 파일 경로로 변경
            },
            {
                id: 'corporate-bonds-analysis',
                title: '글로벌 회사채 심층 분석',
                badge: 'Corporate Bonds',
                description: '투자등급 회사채 종목 발굴 및 리스크 분석',
                features: [
                    '섹터별 신용 스프레드 분석',
                    '추천 종목 10선',
                    '듀레이션별 포트폴리오 구성'
                ],
                price: 1000,
                pdfUrl: '/downloads/corporate-bonds.pdf'
            },
            {
                id: 'emerging-markets',
                title: '이머징 마켓 채권 가이드',
                badge: 'Emerging Markets',
                description: '고수익 이머징 채권 투자 기회 포착',
                features: [
                    '국가별 리스크 평가',
                    '환헤지 전략',
                    '포트폴리오 비중 제안'
                ],
                price: 1000,
                pdfUrl: '/downloads/emerging-markets.pdf'
            },
            {
                id: 'weekly-outlook',
                title: '주간 해외채권 시장 전망',
                badge: 'Weekly Report',
                description: '이번 주 주요 경제지표와 채권 시장 분석',
                features: [
                    '주요 경제지표 일정',
                    '금리 변동 전망',
                    '투자 전략 제언'
                ],
                price: 1000,
                pdfUrl: '/downloads/weekly-outlook.pdf'
            }
        ];

        let selectedProduct = null;

        // Initialize Toss Payments
        // 실제 사용시 clientKey를 발급받아 교체해야 합니다
        const clientKey = 'test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq';
        const tossPayments = TossPayments(clientKey);

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-badge">${product.badge}</div>
                    <h3 class="product-title">${product.title}</h3>
                    <p class="product-description">${product.description}</p>
                    <ul class="product-features">
                        ${product.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <div class="product-footer">
                        <div class="product-price">
                            ₩${product.price.toLocaleString()}
                        </div>
                        <button class="buy-button" onclick="openPurchaseModal('${product.id}')">
                            구매하기
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Open purchase modal
        function openPurchaseModal(productId) {
            selectedProduct = products.find(p => p.id === productId);
            document.getElementById('modalProductTitle').textContent = selectedProduct.title;
            document.getElementById('modalProductPrice').textContent = `₩${selectedProduct.price.toLocaleString()}`;
            document.getElementById('purchaseModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('purchaseModal').classList.remove('active');
            document.getElementById('purchaseForm').reset();
        }

        // Handle form submission
        document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const buyerName = document.getElementById('buyerName').value;
            const buyerEmail = document.getElementById('buyerEmail').value;
            const buyerPhone = document.getElementById('buyerPhone').value;

            // Generate unique order ID
            const orderId = `ORDER_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

            try {
                // Request payment - using general payment method for better compatibility
                await tossPayments.requestPayment('카드', {
                    amount: selectedProduct.price,
                    orderId: orderId,
                    orderName: selectedProduct.title,
                    customerName: buyerName,
                    customerEmail: buyerEmail,
                    customerMobilePhone: buyerPhone,
                    successUrl: `${window.location.origin}${window.location.pathname}?success=true&orderId=${orderId}&productId=${selectedProduct.id}`,
                    failUrl: `${window.location.origin}${window.location.pathname}?success=false`,
                });
            } catch (error) {
                console.error('Payment error:', error);
                if (error.code === 'USER_CANCEL') {
                    // User cancelled - just close modal
                    closeModal();
                } else {
                    alert('결제 처리 중 오류가 발생했습니다. 다시 시도해주세요.');
                }
            }
        });

        // Check for payment success
        function checkPaymentResult() {
            const urlParams = new URLSearchParams(window.location.search);
            const success = urlParams.get('success');
            const productId = urlParams.get('productId');
            const paymentKey = urlParams.get('paymentKey');

            if (success === 'true' && productId) {
                const product = products.find(p => p.id === productId);
                if (product) {
                    showDownloadPage(product);
                } else {
                    // Product not found, show error
                    alert('상품 정보를 찾을 수 없습니다. 홈으로 돌아갑니다.');
                    window.location.href = window.location.pathname;
                }
            } else if (success === 'false') {
                alert('결제가 취소되었습니다.');
                window.location.href = window.location.pathname;
            }
        }

        // Show download page
        function showDownloadPage(product) {
            document.getElementById('productsGrid').style.display = 'none';
            document.getElementById('downloadMessage').textContent = 
                `"${product.title}" 구매가 완료되었습니다. 아래 버튼을 클릭하여 다운로드하세요.`;
            
            const downloadButton = document.getElementById('downloadButton');
            downloadButton.href = product.pdfUrl;
            downloadButton.download = `${product.id}.pdf`;
            
            document.getElementById('downloadSection').classList.add('active');
        }

        // Initialize
        renderProducts();
        checkPaymentResult();
    </script>
</body>
</html>
